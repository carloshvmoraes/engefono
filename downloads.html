<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads - Engefono</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="bg-white shadow-sm p-6">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-blue-900">Engefono</a>
            <a href="index.html" class="text-blue-700 hover:underline flex items-center">
                <i class="fas fa-arrow-left mr-2"></i> Voltar ao Início
            </a>
        </div>
    </nav>

    <main class="container mx-auto py-20 px-6">
        <div class="max-w-2xl mx-auto">
            <h1 class="text-3xl font-bold mb-2 text-blue-950">Central de Downloads</h1>
            <p class="text-slate-600 mb-8">Arquivos e instaladores protegidos para clientes e parceiros.</p>
            
            <div class="grid gap-4">
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col sm:flex-row justify-between items-center gap-4 hover:border-blue-300 transition">
                    <div class="flex items-center">
                        <div class="bg-blue-100 p-3 rounded-lg text-blue-700 mr-4">
                            <i class="fas fa-microchip text-xl"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-blue-900">Instalador DeglutiSom Versão 25.04.09</h3>
                            <p class="text-xs text-slate-500 italic"><i class="fas fa-lock mr-1"></i> Requer senha de acesso</p>
                        </div>
                    </div>
                    
                    <button 
                        onclick="baixarComSenha()" 
                        class="w-full sm:w-auto bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-800 transition flex items-center justify-center"
                    >
                        <i class="fas fa-download mr-2"></i> Baixar Agora
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-10 text-slate-400 text-sm">
        <p>&copy; 2026 Engefono - Curitiba, PR.</p>
    </footer>

    <script>
        function baixarComSenha() {
            // Configurações
            const senhaCorreta = "p5m9eh";
            const caminhoArquivo = "downloads/InstalaDeglutiSom_250409.exe";
            const nomeArquivo = "InstalaDeglutiSom_250409.exe";

            // Solicitação ao usuário
            const entrada = prompt("Digite a senha para liberar o instalador:");

            if (entrada === null) {
                return; // Usuário cancelou
            }

            if (entrada === senhaCorreta) {
                // Senha correta: executa o download
                const link = document.createElement('a');
                link.href = caminhoArquivo;
                link.download = nomeArquivo;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                alert("Senha confirmada. O download será iniciado.");
            } else {
                // Senha incorreta
                alert("Senha incorreta. O acesso ao arquivo foi negado.");
            }
        }
    </script>
</body>
</html>
